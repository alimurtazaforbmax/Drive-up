name: Build installers

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: DriveUp-Windows
          - os: macos-latest
            artifact: DriveUp-macOS
          - os: ubuntu-latest
            artifact: DriveUp-Linux

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-build.txt

      - name: Build with PyInstaller
        run: python -m PyInstaller --noconfirm --clean driveup.spec

      - name: Package Windows zip
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist/installers | Out-Null
          Compress-Archive -Path dist/DriveUp\* -DestinationPath dist/installers/DriveUp-Windows.zip -Force

      - name: Package macOS
        if: runner.os == 'macOS'
        run: |
          mkdir -p dist/installers
          if [ -d dist/DriveUp.app ]; then
            ditto -c -k --sequesterRsrc --keepParent dist/DriveUp.app dist/installers/DriveUp-macOS.zip
          else
            ditto -c -k --sequesterRsrc --keepParent dist/DriveUp dist/installers/DriveUp-macOS.zip
          fi

      - name: Package Linux
        if: runner.os == 'Linux'
        run: |
          mkdir -p dist/installers
          tar -C dist -czf dist/installers/DriveUp-Linux.tar.gz DriveUp

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/installers/*
